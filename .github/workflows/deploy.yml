name: Deploy para HostGator

on:
  push:
    branches:
      - main # Executa a ação toda vez que houver um push na branch 'main'
  workflow_dispatch: # Permite rodar o deploy manualmente clicando em um botão no GitHub!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código do repositório GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configurar o ambiente com Node.js (versão 20 estável)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar as dependências do projeto (npm install comum evita estresse de cache/lock)
      - name: Install Dependencies
        run: npm install

      # 4. Compilar o site (Vite gera a pasta /dist com os arquivos estáticos)
      - name: Build Project
        run: npm run build

      # 4.5. Tratar dinamicamente as credenciais do FTP (evitando erros comuns de digitação ou protocolos colocados por engano)
      - name: Format and Sanitize FTP Configuration
        run: |
          # Higienizar o Servidor (remover ftp://, ftps:// e barras finais para evitar ENOTFOUND)
          SERVER="${{ secrets.FTP_SERVER }}"
          SERVER="${SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER#http://}"
          SERVER="${SERVER#https://}"
          SERVER="${SERVER%/}"
          # Remover espaços em branco acidentais
          SERVER=$(echo "$SERVER" | xargs)
          echo "FTP_SERVER_CLEANED=$SERVER" >> $GITHUB_ENV

          # Higienizar o Diretório (garantir barra no final)
          DIR="${{ secrets.FTP_DIR }}"
          DIR=$(echo "$DIR" | xargs)
          if [ -z "$DIR" ]; then
            DIR="./"
          elif [[ "$DIR" != */ ]]; then
            DIR="$DIR/"
          fi
          echo "FTP_DIR_FORMATTED=$DIR" >> $GITHUB_ENV

      # 5. Fazer o deploy para a HostGator via FTP
      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER_CLEANED }}   # Usando o servidor higienizado sem protocolos
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp                            # OBRIGATÓRIO NA HOSTGATOR: Evita o erro 421 de SSL/TLS com contas FTP secundárias
          local-dir: ./dist/                    # Envia apenas o conteúdo compilado pela Vite
          server-dir: ${{ env.FTP_DIR_FORMATTED }} # Pasta tratada dinamicamente com "/" garantido no final
          dangerous-clean-slate: false          # Se true, remove todos os outros arquivos da pasta remota (mantenha false por segurança)
