name: Deploy para HostGator

on:
  push:
    branches:
      - main # Executa a ação toda vez que houver um push na branch 'main'
  workflow_dispatch: # Permite rodar o deploy manualmente clicando em um botão no GitHub!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código do repositório GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configurar o ambiente com Node.js (versão 20 estável)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar as dependências do projeto (npm install comum evita estresse de cache/lock)
      - name: Install Dependencies
        run: npm install

      # 4. Compilar o site (Vite gera a pasta /dist com os arquivos estáticos)
      - name: Build Project
        run: npm run build

      # 4.5. Tratar dinamicamente o diretório do FTP (evitando erros de falta de barra '/' ou campo vazio)
      - name: Format FTP Directory Path
        run: |
          DIR="${{ secrets.FTP_DIR }}"
          if [ -z "$DIR" ]; then
            DIR="public_html/"
          elif [[ "$DIR" != */ ]]; then
            DIR="$DIR/"
          fi
          echo "FTP_DIR_FORMATTED=$DIR" >> $GITHUB_ENV

      # 5. Fazer o deploy para a HostGator via FTP
      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/                    # Envia apenas o conteúdo compilado pela Vite
          server-dir: ${{ env.FTP_DIR_FORMATTED }} # Pasta tratada dinamicamente com "/" garantido no final
          dangerous-clean-slate: false          # Se true, remove todos os outros arquivos da pasta remota (mantenha false por segurança)
